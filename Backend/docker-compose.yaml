services:
  tramplin_app:
    image: app
    container_name: tramplin_app
    build: 
      context: .
    depends_on:
      tramplin_postgres:
        condition: service_healthy
      tramplin_redis:
        condition: service_healthy
      tramplin_init:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT}:${APP_PORT}"

  tramplin_init:
    build: .
    container_name: tramplin_init
    command: ./seed
    depends_on:
      tramplin_postgres:
        condition: service_healthy
    env_file:
      - .env
  
  tramplin_postgres:
    image: postgres
    container_name: tramplin_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:${DB_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/18/main
  
  tramplin_redis:
    image: redis:latest
    container_name: tramplin_redis
    restart: always
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis_data:
  postgres_data: